<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Payroll Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <header>
            <div class="header-content">
                <h1>PAYROLL <span class="gold-text">PRO</span></h1>
                <button id="btn-settings" class="icon-btn">
                    <span class="material-icons">settings</span>
                </button>
            </div>
        </header>

        <main id="main-screen" class="screen">
            <div id="form-spain" class="country-form">
                <div class="input-group">
                    <label>Salario Bruto Anual (€)</label>
                    <input type="number" id="sp-annual-gross" placeholder="Ej: 30000" inputmode="decimal">
                </div>
                <div class="input-group">
                    <label>Retención IRPF % (Opcional)</label>
                    <input type="number" id="sp-irpf-manual" placeholder="Automático" inputmode="decimal">
                </div>
            </div>

            <div id="form-uk" class="country-form hidden">
                <div class="input-group">
                    <label>Annual Gross Salary (£)</label>
                    <input type="number" id="uk-annual-gross" placeholder="Ej: 45000" inputmode="decimal">
                </div>
                <div class="input-group">
                    <label>Tax Region</label>
                    <select id="uk-region-select">
                        <option value="rUK">England / Wales / NI</option>
                        <option value="SCO">Scotland (Special Bands)</option>
                    </select>
                </div>
                <div class="toggle-container">
                    <label>Include Holiday Pay (12.07%)</label>
                    <input type="checkbox" id="uk-holiday-pay">
                </div>
            </div>

            <button id="btn-calculate" class="main-btn">CALCULAR</button>

            <div id="results-container" class="results-card">
                <div class="net-label">NETO MENSUAL ESTIMADO</div>
                <div id="net-result-value" class="net-value">0.00€</div>
                <div id="results-list" class="breakdown-list"></div>
            </div>
        </main>

        <section id="settings-screen" class="screen hidden">
            <div class="settings-header">
                <button class="btn-back icon-btn"><span class="material-icons">arrow_back</span></button>
                <h2>Ajustes</h2>
            </div>
            <div class="settings-content">
                <div class="pro-card">
                    <h3>Versión PRO</h3>
                    <p>Desbloquea todas las funciones avanzadas.</p>
                    <button class="gold-btn">DESBLOQUEAR</button>
                </div>
            </div>
        </section>

        <nav id="bottom-nav">
            <button class="nav-btn active" data-country="spain">
                <img src="https://flagcdn.com/w40/es.png" width="24"> <span>España</span>
            </button>
            <button class="nav-btn" data-country="uk">
                <img src="https://flagcdn.com/w40/gb.png" width="24"> <span>UK</span>
            </button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
